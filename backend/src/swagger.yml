openapi: 3.0.0
info:
  title: Interview Task API
  description: API documentation for the full stack project.
  version: 1.0.0
servers:
  - url: http://localhost:5001/api
    description: Local development server

paths:
  /auth/signup:
    post:
      summary: User signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                username:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Signup successful
        '400':
          description: Invalid input

  /auth/verify-otp:
    post:
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                otp:
                  type: string
      responses:
        '200':
          description: Verification successful
        '400':
          description: Invalid OTP or expiry
